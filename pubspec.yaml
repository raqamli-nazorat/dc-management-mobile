name: dcmanagement
description: "DC Management — Ishchilarni boshqarish tizimi"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Local persistence
  shared_preferences: ^2.3.3

  # Image
  cached_network_image: ^3.4.1

  # Models (code gen)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Date
  intl: ^0.20.2
  firebase_core: ^4.7.0
  http: ">=1.0.0-pre.1 <=3.0.0"
  firebase_messaging: ^16.2.0
  firebase_auth: ^6.4.0
  lucide_icons: ^0.257.0
  cloud_firestore: ^6.3.0
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: "assets/fonts/Manrope-ExtraBold.ttf"
          weight: 900
        - asset: "assets/fonts/Manrope-Medium.ttf"
          weight: 500

  assets:
    - assets/
    - assets/icons/
    - assets/images/
